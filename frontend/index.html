<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <title>Pametni Porodični Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen p-6">

    <h1 class="text-2xl font-bold mb-6">🐱 Henri Tracker</h1>

    <div class="bg-white rounded-lg shadow p-6 max-w-md">
        <div class="flex gap-2 mb-4" id="dugmici-clanovi">
            <!-- Dugmići za Vasa/Ana/Jole se ubacuju iz JS-a -->
        </div>

        <table class="w-full text-sm">
            <thead>
                <tr class="text-left border-b">
                    <th class="py-2">Ko</th>
                    <th class="py-2">Vreme</th>
                </tr>
            </thead>
            <tbody id="tabela-hranjenja">
                <!-- Redovi se ubacuju iz JS-a -->
            </tbody>
        </table>
    </div>
    <h1 class="text-2xl font-bold mb-6 mt-10">🧹 Kućni poslovi</h1>

<div class="bg-white rounded-lg shadow p-6 max-w-md">
    <div class="flex gap-2 mb-4">
        <input type="text" id="input-novi-posao"
               class="border rounded px-3 py-2 flex-1"
               placeholder="Novi posao...">
        <button id="dugme-dodaj-posao"
                class="px-4 py-2 bg-green-500 text-white rounded hover:bg-green-600">
            Dodaj
        </button>
    </div>

    <ul id="lista-poslova" class="space-y-2">
        <!-- Poslovi se ubacuju iz JS-a -->
    </ul>
</div>
    <script src="app.js"></script>
</body>
</html>
