<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pametni Porodični Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen pb-20 md:pb-6">

    <!-- Gornja traka - vidljiva samo na desktopu (md i vece) -->
    <nav class="hidden md:flex gap-2 bg-white shadow p-4 mb-6">
        <button class="tab-dugme px-4 py-2 rounded font-medium" data-tab="henri">🐱 Henri</button>
        <button class="tab-dugme px-4 py-2 rounded font-medium" data-tab="poslovi">🧹 Poslovi</button>
        <button class="tab-dugme px-4 py-2 rounded font-medium" data-tab="kupovina">🛒 Kupovina</button>
    </nav>

    <div class="p-4 md:p-6 max-w-lg mx-auto">

        <!-- HENRI TAB -->
        <section id="tab-henri" class="tab-sadrzaj">
            <h1 class="text-2xl font-bold mb-4">🐱 Henri Tracker</h1>
            <div class="bg-white rounded-lg shadow p-4 md:p-6">
                <div class="flex gap-2 mb-4 flex-wrap" id="dugmici-clanovi"></div>
                <table class="w-full text-sm">
                    <thead>
                        <tr class="text-left border-b">
                            <th class="py-2">Ko</th>
                            <th class="py-2">Vreme</th>
                        </tr>
                    </thead>
                    <tbody id="tabela-hranjenja"></tbody>
                </table>
            </div>
        </section>

        <!-- POSLOVI TAB -->
        <section id="tab-poslovi" class="tab-sadrzaj hidden">
            <h1 class="text-2xl font-bold mb-4">🧹 Kućni poslovi</h1>
            <div class="bg-white rounded-lg shadow p-4 md:p-6">
                <div class="flex gap-2 mb-4">
                    <input type="text" id="input-novi-posao"
                           class="border rounded px-3 py-2 flex-1 min-w-0"
                           placeholder="Novi posao...">
                    <button id="dugme-dodaj-posao"
                            class="px-4 py-2 bg-green-500 text-white rounded hover:bg-green-600 whitespace-nowrap">
                        Dodaj
                    </button>
                </div>
                <ul id="lista-poslova" class="space-y-2"></ul>
            </div>
        </section>

        <!-- KUPOVINA TAB -->
        <section id="tab-kupovina" class="tab-sadrzaj hidden">
            <h1 class="text-2xl font-bold mb-4">🛒 Spisak za kupovinu</h1>
            <div class="bg-white rounded-lg shadow p-4 md:p-6">
                <div class="flex gap-2 mb-4">
                    <input type="text" id="input-novi-artikal"
                           class="border rounded px-3 py-2 flex-1 min-w-0"
                           placeholder="Novi artikal...">
                    <button id="dugme-dodaj-artikal"
                            class="px-4 py-2 bg-green-500 text-white rounded hover:bg-green-600 whitespace-nowrap">
                        Dodaj
                    </button>
                </div>
                <ul id="lista-kupovina" class="space-y-2"></ul>
            </div>
        </section>

    </div>

    <!-- Donja traka - vidljiva samo na
